# Celery/kombu déclare ses queues de contrôle (pidbox, mingle, gossip) en
# transient non-exclusif. RabbitMQ 4.1 refuse par défaut cette feature
# dépréciée : Queue.declare → 541 INTERNAL_ERROR, le worker celery boucle en
# reconnexion (conteneur unhealthy, RestartFreqExceeded). On re-permet la
# feature explicitement, en attendant une version de Celery/kombu qui n'en
# dépende plus. Réf : rabbitmq.com/blog (deprecated features) + issues kombu.
deprecated_features.permit.transient_nonexcl_queues = true
