# Charge les users/vhosts/permissions depuis un fichier de définitions à CHAQUE
# démarrage — y compris si le volume existe déjà (contrairement à
# RABBITMQ_DEFAULT_USER/PASS qui ne s'appliquent qu'à la 1re initialisation).
# Le fichier est généré depuis definitions.tpl.json par `make jangubi-rabbitmq-definitions`.
load_definitions = /etc/rabbitmq/definitions.json
