name: Deploy JanguBi

on:
  repository_dispatch:
    types:
      - deploy-backend
      - deploy-frontend
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag (ex: develop-abc1234)"
        required: false
        default: "latest"
      target:
        description: "Cible"
        required: false
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-jangubi-${{ github.event.client_payload.ref || github.event.inputs.target }}
  cancel-in-progress: false

jobs:

  deploy-staging:
    runs-on: ubuntu-24.04
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'staging')
      || contains(fromJSON('["develop", "stage"]'), github.event.client_payload.ref)

    steps:
      - name: Résoudre le tag
        id: vars
        run: |
          TAG="${{ github.event.client_payload.tag || github.event.inputs.tag || 'latest' }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # env: évite les problèmes d'interpolation YAML avec les clés multilignes
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Récupérer l'empreinte du serveur (évite StrictHostKeyChecking)
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test connexion SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "echo '✅ SSH OK — $(hostname)'"

      - name: Deploy staging
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "set -e
               cd /opt/kamalfils/infrastructure
               git pull
               make jangubi-deploy TAG=$TAG
               make ps"

      - name: Résumé
        run: |
          echo "## 🟡 Staging déployé" >> $GITHUB_STEP_SUMMARY
          echo "- Tag : ${{ steps.vars.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL : https://jangubi.kamalfils.app" >> $GITHUB_STEP_SUMMARY
          
  deploy-production:
    runs-on: ubuntu-24.04
    needs: deploy-staging
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
      || github.event.client_payload.ref == 'main'
      || startsWith(github.event.client_payload.ref, 'v')

    steps:
      - name: Résoudre le tag
        id: vars
        run: |
          TAG="${{ github.event.client_payload.tag || github.event.inputs.tag || 'latest' }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Configurer SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Ajouter le serveur prod aux known hosts
        run: ssh-keyscan -H ${{ secrets.PROD_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy sur le serveur production
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          ssh ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} \
              "set -e
               cd /opt/kamalfils/infrastructure
               git pull
               make jangubi-deploy TAG=$TAG
               make ps"

      - name: Résumé
        run: |
          echo "## 🟢 Production déployée" >> $GITHUB_STEP_SUMMARY
          echo "- Tag : ${{ steps.vars.outputs.tag }}" >> $GITHUB_STEP_SUMMARY