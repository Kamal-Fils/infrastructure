name: Deploy Jaaykoo staging

# Reçoit les repository_dispatch des CI Jaaykoo/api (deploy-jaaykoo-backend),
# Jaaykoo/ClientBridgeUI (deploy-jaaykoo-storefront) et Jaaykoo/AdminUI
# (deploy-jaaykoo-admin) pour develop/stage, et déploie apps/jaaykoo/ sur CE
# serveur (staging mutualisé Kamal&Fils).
#
# /!\ Types d'événement DÉDIÉS deploy-jaaykoo-* : deploy-backend/deploy-frontend
#     sont consommés par deploy.yml (JanguBi) et deploy-guiss-* par
#     deploy-guiss.yml — des types partagés déclencheraient plusieurs stacks.
#
# La prod Jaaykoo n'a pas encore de repo infra — les dispatches main/v* seront
# routés par les CI des apps le moment venu, pas ici.

on:
  repository_dispatch:
    types:
      - deploy-jaaykoo-backend
      - deploy-jaaykoo-storefront
      - deploy-jaaykoo-admin
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag de déploiement (develop / stage)"
        required: false
        default: "develop"

# Un seul déploiement Jaaykoo à la fois ; on n'interrompt pas un déploiement
# en cours (cancel-in-progress: false).
concurrency:
  group: deploy-jaaykoo-staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    runs-on: ubuntu-24.04
    # Ceinture + bretelles : même si un dispatch inattendu arrive (ref main),
    # on ne déploie ici que develop/stage — ce workflow ne connaît QUE le staging.
    if: |
      github.event_name == 'workflow_dispatch'
      || contains(fromJSON('["develop", "stage"]'), github.event.client_payload.ref)

    steps:
      - name: Résoudre le tag
        id: vars
        run: |
          TAG="${{ github.event.client_payload.tag || github.event.inputs.tag || 'develop' }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Configurer SSH (webfactory/ssh-agent)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      - name: Ajouter le serveur aux known hosts
        run: ssh-keyscan -H ${{ secrets.STAGING_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Déployer la stack Jaaykoo
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          ssh ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }} \
              "set -e
               cd /opt/kamalfils/infrastructure
               git pull
               make jaaykoo-deploy TAG=$TAG
               make ps"

      - name: Résumé
        run: |
          echo "## Jaaykoo staging déployé"                        >> $GITHUB_STEP_SUMMARY
          echo "- Tag : ${{ steps.vars.outputs.tag }}"             >> $GITHUB_STEP_SUMMARY
          echo "- API : https://api-jaaykoo.kamalfils.app"         >> $GITHUB_STEP_SUMMARY
          echo "- Storefront : https://jaaykoo.kamalfils.app"      >> $GITHUB_STEP_SUMMARY
          echo "- Admin : https://admin-jaaykoo.kamalfils.app"     >> $GITHUB_STEP_SUMMARY
